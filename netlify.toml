import React, { useState, useMemo } from 'react';
import { Sun, Moon, Search, MapPin, ExternalLink, GraduationCap, Calendar, AlertCircle, Filter, X } from 'lucide-react';
import initialPrograms from '../discovered_programs.json';

const REGIONS = ["All", "Norte", "Nordeste", "Centro-Oeste", "Sudeste", "Sul"];
const STATUSES = ["All", "Open", "Closed", "Check Portal"];

export default function App() {
  const [darkMode, setDarkMode] = useState(false);
  const [searchTerm, setSearchTerm] = useState("");
  const [selectedRegion, setSelectedRegion] = useState("All");
  const [selectedStatus, setSelectedStatus] = useState("All");
  const [showFilters, setShowFilters] = useState(false);

  const filteredPrograms = useMemo(() => {
    return initialPrograms.filter(program => {
      const term = searchTerm.toLowerCase();
      const matchesSearch =
        program.program.toLowerCase().includes(term) ||
        program.university.toLowerCase().includes(term) ||
        program.state.toLowerCase().includes(term);
      const matchesRegion = selectedRegion === "All" || program.region === selectedRegion;
      const matchesStatus = selectedStatus === "All" || program.status === selectedStatus;
      return matchesSearch && matchesRegion && matchesStatus;
    });
  }, [searchTerm, selectedRegion, selectedStatus]);

  const openCount = initialPrograms.filter(p => p.status === "Open").length;

  const getStatusStyles = (status) => {
    switch (status) {
      case 'Open':
        return 'bg-emerald-50 dark:bg-emerald-950/40 text-emerald-700 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800';
      case 'Closed':
        return 'bg-rose-50 dark:bg-rose-950/40 text-rose-700 dark:text-rose-400 border-rose-200 dark:border-rose-800';
      default:
        return 'bg-amber-50 dark:bg-zinc-800 text-amber-700 dark:text-zinc-400 border-amber-200 dark:border-zinc-600';
    }
  };

  const getCardAccent = (status) => {
    switch (status) {
      case 'Open':   return 'border-l-emerald-500 dark:border-l-emerald-400';
      case 'Closed': return 'border-l-rose-400 dark:border-l-rose-500';
      default:       return 'border-l-amber-400 dark:border-l-amber-500';
    }
  };

  const activeFilterCount = [
    selectedRegion !== "All",
    selectedStatus !== "All",
  ].filter(Boolean).length;

  return (
    <div className={darkMode ? 'dark' : ''}>
      <div className="min-h-screen bg-slate-50 dark:bg-zinc-900 text-slate-800 dark:text-zinc-100 transition-colors duration-300">

        {/* HEADER */}
        <header className="sticky top-0 z-50 bg-emerald-600 dark:bg-emerald-800 text-white shadow-md border-b-4 border-amber-400 transition-colors">
          <div className="max-w-lg mx-auto px-4 py-3 flex justify-between items-center">
            <div className="flex items-center gap-2">
              <span className="text-2xl">🇧🇷</span>
              <div>
                <h1 className="font-black text-xl tracking-tight leading-none">
                  Estudar<span className="text-amber-300">BR</span>
                </h1>
                <p className="text-emerald-200 text-[10px] font-semibold tracking-wide leading-none mt-0.5">
                  POSTGRADUATE DIRECTORY
                </p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              {openCount > 0 && (
                <span className="hidden sm:flex items-center gap-1 text-[10px] font-black bg-emerald-500 dark:bg-emerald-700 px-2 py-1 rounded-full border border-emerald-400">
                  <span className="w-1.5 h-1.5 bg-amber-300 rounded-full animate-pulse inline-block"/>
                  {openCount} OPEN
                </span>
              )}
              <button
                onClick={() => setDarkMode(!darkMode)}
                className="p-2 rounded-full bg-emerald-700 dark:bg-emerald-900 hover:bg-emerald-500 transition-colors"
                aria-label="Toggle Theme"
              >
                {darkMode ? <Sun size={18} className="text-amber-300" /> : <Moon size={18} />}
              </button>
            </div>
          </div>
        </header>

        <main className="max-w-lg mx-auto px-4 py-5 pb-24">

          {/* HERO */}
          <div className="mb-5">
            <h2 className="text-2xl font-extrabold mb-1 bg-gradient-to-r from-emerald-600 to-teal-500 dark:from-emerald-400 dark:to-teal-300 bg-clip-text text-transparent">
              Live Admission Tracker
            </h2>
            <p className="text-sm text-slate-500 dark:text-zinc-400">
              {initialPrograms.length} postgraduate programs across Brazil — auto-updated weekly.
            </p>
          </div>

          {/* SEARCH + FILTER TOGGLE */}
          <div className="flex gap-2 mb-4">
            <div className="relative flex-1">
              <Search className="absolute left-3 top-3.5 text-slate-400 dark:text-zinc-500" size={16} />
              <input
                type="text"
                placeholder="Search courses, universities, states…"
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                className="w-full pl-9 pr-9 py-3 rounded-xl border border-slate-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 dark:focus:ring-emerald-400 text-sm font-medium transition-all"
              />
              {searchTerm && (
                <button onClick={() => setSearchTerm("")} className="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600">
                  <X size={16} />
                </button>
              )}
            </div>
            <button
              onClick={() => setShowFilters(!showFilters)}
              className={`relative flex items-center gap-1.5 px-3 py-3 rounded-xl border text-sm font-bold transition-all ${
                showFilters || activeFilterCount > 0
                  ? 'bg-emerald-600 text-white border-emerald-600'
                  : 'bg-white dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 border-slate-200 dark:border-zinc-700'
              }`}
            >
              <Filter size={16} />
              {activeFilterCount > 0 && (
                <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-amber-400 text-slate-900 text-[9px] font-black rounded-full flex items-center justify-center">
                  {activeFilterCount}
                </span>
              )}
            </button>
          </div>

          {/* FILTER PANEL */}
          {showFilters && (
            <div className="bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 rounded-2xl p-4 mb-4 shadow-sm">
              <div className="mb-3">
                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-zinc-500 mb-2">Region</p>
                <div className="flex flex-wrap gap-1.5">
                  {REGIONS.map(r => (
                    <button key={r} onClick={() => setSelectedRegion(r)}
                      className={`px-3 py-1 rounded-full text-xs font-bold border transition-all ${
                        selectedRegion === r
                          ? 'bg-amber-400 text-slate-900 border-amber-400'
                          : 'bg-slate-50 dark:bg-zinc-700 text-slate-600 dark:text-zinc-300 border-slate-200 dark:border-zinc-600 hover:border-emerald-400'
                      }`}
                    >{r}</button>
                  ))}
                </div>
              </div>
              <div>
                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-zinc-500 mb-2">Admission Status</p>
                <div className="flex flex-wrap gap-1.5">
                  {STATUSES.map(s => (
                    <button key={s} onClick={() => setSelectedStatus(s)}
                      className={`px-3 py-1 rounded-full text-xs font-bold border transition-all ${
                        selectedStatus === s
                          ? 'bg-amber-400 text-slate-900 border-amber-400'
                          : 'bg-slate-50 dark:bg-zinc-700 text-slate-600 dark:text-zinc-300 border-slate-200 dark:border-zinc-600 hover:border-emerald-400'
                      }`}
                    >{s}</button>
                  ))}
                </div>
              </div>
              {activeFilterCount > 0 && (
                <button
                  onClick={() => { setSelectedRegion("All"); setSelectedStatus("All"); }}
                  className="mt-3 text-xs text-rose-500 font-bold hover:underline"
                >
                  Clear all filters
                </button>
              )}
            </div>
          )}

          {/* RESULTS COUNT */}
          <div className="flex justify-between items-center mb-3">
            <p className="text-xs font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">
              Showing {filteredPrograms.length} of {initialPrograms.length} programs
            </p>
          </div>

          {/* CARDS */}
          <div className="space-y-3">
            {filteredPrograms.length > 0 ? (
              filteredPrograms.map((program) => (
                <div
                  key={program.id}
                  className={`bg-white dark:bg-zinc-800 border border-slate-100 dark:border-zinc-700/60 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all border-l-4 ${getCardAccent(program.status)} flex flex-col`}
                >
                  {/* TOP ROW */}
                  <div className="flex justify-between items-center gap-2 mb-2">
                    <span className={`text-[10px] font-black uppercase tracking-wider px-2.5 py-1 rounded-md border ${getStatusStyles(program.status)}`}>
                      ● {program.status}
                    </span>
                    <div className="flex items-center gap-2">
                      {program.type && (
                        <span className="text-[10px] font-bold text-slate-400 dark:text-zinc-500 hidden sm:block">
                          {program.type}
                        </span>
                      )}
                      <div className="flex items-center gap-1 text-xs font-bold text-slate-500 dark:text-zinc-400 bg-slate-100 dark:bg-zinc-700/60 px-2 py-0.5 rounded-full">
                        <MapPin size={11} className="text-amber-500" />
                        {program.state}
                      </div>
                    </div>
                  </div>

                  {/* PROGRAM NAME */}
                  <h4 className="font-bold text-sm text-slate-900 dark:text-zinc-100 mb-1 leading-snug flex items-start gap-1.5">
                    <GraduationCap size={16} className="text-emerald-600 dark:text-emerald-400 shrink-0 mt-0.5" />
                    {program.program}
                  </h4>

                  {/* UNIVERSITY */}
                  <p className="text-xs font-medium text-slate-500 dark:text-zinc-400 pl-5 mb-2">
                    {program.university}
                  </p>

                  {/* DEADLINE */}
                  <div className="flex items-center gap-1.5 pl-5 mb-3 text-xs font-semibold text-slate-400 dark:text-zinc-500">
                    <Calendar size={12} className="shrink-0" />
                    <span>Deadline:&nbsp;
                      <strong className={`font-bold ${program.deadline === 'See Website' ? 'text-slate-500 dark:text-zinc-400' : 'text-emerald-600 dark:text-emerald-400'}`}>
                        {program.deadline}
                      </strong>
                    </span>
                  </div>

                  {/* ACTION BUTTON */}
                  <a
                    href={program.link}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="w-full py-2.5 px-4 bg-slate-900 dark:bg-zinc-700 hover:bg-emerald-600 dark:hover:bg-emerald-600 text-white font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition-all group"
                  >
                    Open Application Portal
                    <ExternalLink size={13} className="group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" />
                  </a>
                </div>
              ))
            ) : (
              <div className="text-center py-14 bg-white dark:bg-zinc-800 rounded-2xl border border-dashed border-slate-200 dark:border-zinc-700">
                <AlertCircle className="mx-auto text-slate-300 dark:text-zinc-600 mb-3" size={32} />
                <p className="text-sm font-bold text-slate-400 dark:text-zinc-500">No programs match your search.</p>
                <button
                  onClick={() => { setSearchTerm(""); setSelectedRegion("All"); setSelectedStatus("All"); }}
                  className="mt-3 text-xs text-emerald-600 dark:text-emerald-400 font-bold hover:underline"
                >
                  Clear all filters
                </button>
              </div>
            )}
          </div>

          {/* FOOTER NOTE */}
          <div className="mt-8 text-center text-[10px] text-slate-400 dark:text-zinc-600">
            <p>Data refreshed every Sunday via automated scraper.</p>
            <p className="mt-0.5">Always verify deadlines on the official university portal.</p>
          </div>
        </main>
      </div>
    </div>
  );
}
